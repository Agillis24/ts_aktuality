<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tender systems – Novinky widget</title>
  <meta name="description" content="Widget novinek Tender systems z RSS feedu pro vložení do Weebly nebo jiného webu." />
  <style>
    :root {
      --ts-orange: #f58200;
      --ts-navy: #24324a;
      --ts-text: #24324a;
      --ts-muted: #6b7280;
      --ts-line: #e5e7eb;
      --ts-bg: #ffffff;
      --ts-soft: #f8fafc;
      --ts-radius: 18px;
      --ts-shadow: 0 8px 24px rgba(36, 50, 74, 0.08);
      --content-width: 1100px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #fff; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ts-text);
      line-height: 1.55;
      padding: 24px 18px 40px;
    }

    .widget {
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .widget__header {
      margin-bottom: 34px;
      text-align: center;
    }

    .widget__title {
      margin: 0;
      color: var(--ts-orange);
      font-size: clamp(28px, 4vw, 46px);
      font-weight: 700;
      line-height: 1.15;
    }

    .widget__subtitle {
      margin: 10px auto 0;
      max-width: 760px;
      color: var(--ts-muted);
      font-size: 15px;
    }

    .status {
      padding: 18px 20px;
      border: 1px solid var(--ts-line);
      border-radius: 14px;
      background: var(--ts-soft);
      color: var(--ts-muted);
      text-align: center;
      margin-bottom: 20px;
    }

    .news-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      display: flex;
      flex-direction: column;
      background: var(--ts-bg);
      border: 1px solid var(--ts-line);
      border-radius: var(--ts-radius);
      box-shadow: var(--ts-shadow);
      overflow: hidden;
      min-height: 100%;
    }

    .card__body {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    .card__date {
      display: inline-block;
      margin-bottom: 10px;
      color: var(--ts-orange);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .card__title {
      margin: 0 0 6px;
      font-size: clamp(19px, 1.15vw, 24px);
      line-height: 1.24;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 0;
    }

    .card__title a {
      color: var(--ts-navy);
      text-decoration: none;
    }

    .card__title a:hover,
    .card__title a:focus {
      color: var(--ts-orange);
    }

    .card__excerpt {
      margin: 0 0 16px;
      color: var(--ts-text);
      font-size: 16px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: calc(1.5em * 4);
    }

    .card__actions {
      margin-top: auto;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .btn:hover,
    .btn:focus { transform: translateY(-1px); }

    .btn--primary {
      background: #fff;
      color: var(--ts-orange);
      border: 1px solid var(--ts-orange);
      box-shadow: none;
    }

    .btn--primary:hover,
    .btn--primary:focus {
      background: #fff7ef;
      border-color: var(--ts-orange);
      color: var(--ts-orange);
    }

    .btn--secondary {
      color: var(--ts-navy);
      border: 1px solid var(--ts-line);
      background: #fff;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .pagination__info {
      color: var(--ts-muted);
      font-size: 14px;
      width: 100%;
      text-align: center;
      margin-bottom: 2px;
    }

    .pagination button {
      min-width: 44px;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--ts-line);
      border-radius: 999px;
      background: #fff;
      color: var(--ts-navy);
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    .pagination button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .pagination button.is-active {
      background: var(--ts-orange);
      border-color: var(--ts-orange);
      color: #fff;
    }

    @media (max-width: 1024px) {
      body { padding: 20px 14px 32px; }
      .news-list {
        gap: 18px;
      }
      .card__body {
        padding: 14px 14px 16px;
      }
      .card__title {
        font-size: clamp(18px, 1.8vw, 21px);
      }
      .card__excerpt {
        font-size: 15px;
        -webkit-line-clamp: 3;
        min-height: calc(1.5em * 3);
      }
      .btn {
        min-height: 40px;
      }
    }

    @media (max-width: 900px) {
      body { padding: 18px 12px 32px; }
      .card__body {
        padding: 18px;
      }
      .card__title {
        font-size: 20px;
      }
      .card__excerpt {
        font-size: 16px;
        -webkit-line-clamp: 4;
        min-height: calc(1.5em * 4);
      }
      .btn { min-height: 40px; }
    }

    @media (max-width: 460px) {
      .card__actions {
        gap: 10px;
      }
      .pagination {
        gap: 8px;
      }
      .pagination button {
        min-width: 40px;
        min-height: 40px;
        padding: 0 12px;
      }
    }
  </style>
</head>
<body>
  <div class="widget">
    <header class="widget__header">
      <h1 class="widget__title">Ze světa Tender systems</h1>
    </header>

    <div id="status" class="status">Načítám novinky…</div>
    <section id="newsList" class="news-list" aria-live="polite"></section>
    <nav id="pagination" class="pagination" aria-label="Stránkování novinek"></nav>
  </div>

  <script>
    const RSS_SOURCE_URLS = [
      'https://www.tendersystems.cz/aktuality/feed',
      'https://www.tendersystems.cz/aktuality/feed/',
      'https://www.tendersystems.cz/aktuality/feed?x=1'
    ];
    const PAGE_SIZE = 10;

    const statusEl = document.getElementById('status');
    const newsListEl = document.getElementById('newsList');
    const paginationEl = document.getElementById('pagination');

    let allItems = [];
    let currentPage = 1;

    function decodeHtmlEntities(str) {
      const txt = document.createElement('textarea');
      txt.innerHTML = str || '';
      return txt.value;
    }

    function stripHtml(html) {
      const temp = document.createElement('div');
      temp.innerHTML = html || '';
      return (temp.textContent || temp.innerText || '').replace(/\s+/g, ' ').trim();
    }

    function truncate(text, maxLength = 260) {
      if (!text) return '';
      if (text.length <= maxLength) return text;
      return text.slice(0, maxLength).replace(/\s+\S*$/, '') + '…';
    }

    function extractText(item) {
      const encoded = item['content:encoded'] || item.content || '';
      const description = item.description || '';
      const text = stripHtml(decodeHtmlEntities(encoded || description));
      return truncate(text, 260);
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      if (isNaN(date)) return '';
      return new Intl.DateTimeFormat('cs-CZ', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      }).format(date);
    }

    function normalizeItem(item) {
      const link = item.link || 'https://www.tendersystems.cz/aktuality';
      return {
        title: decodeHtmlEntities(item.title || 'Bez názvu'),
        link,
        date: formatDate(item.pubDate || item.published || item.isoDate),
        excerpt: extractText(item)
      };
    }

    function parseItemDate(item) {
      const value = item.pubDate || item.published || item.isoDate || '';
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? 0 : date.getTime();
    }

    async function fetchItemsFromSource(rssUrl) {
      const endpoint = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(rssUrl);
      const res = await fetch(endpoint, { cache: 'no-store' });
      const data = await res.json();

      if (!res.ok || !data || data.status !== 'ok' || !Array.isArray(data.items)) {
        throw new Error('Nepodařilo se načíst RSS feed.');
      }

      return data.items;
    }

    function mergeAndSortItems(itemGroups) {
      const byLink = new Map();

      itemGroups.flat().forEach(item => {
        const link = item.link || item.guid;
        if (!link) return;

        const existing = byLink.get(link);
        if (!existing || parseItemDate(item) > parseItemDate(existing)) {
          byLink.set(link, item);
        }
      });

      return [...byLink.values()].sort((a, b) => parseItemDate(b) - parseItemDate(a));
    }

    function renderPage(page) {
      currentPage = page;
      const totalPages = Math.max(1, Math.ceil(allItems.length / PAGE_SIZE));
      const start = (page - 1) * PAGE_SIZE;
      const items = allItems.slice(start, start + PAGE_SIZE);

      newsListEl.innerHTML = items.map(item => `
        <article class="card">
          <div class="card__body">
            <div class="card__date">${item.date}</div>
            <h2 class="card__title"><a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a></h2>
            <p class="card__excerpt">${item.excerpt}</p>
            <div class="card__actions">
              <a class="btn btn--primary" href="${item.link}" target="_blank" rel="noopener noreferrer">Číst novinku</a>
            </div>
          </div>
        </article>
      `).join('');

      renderPagination(totalPages);
      statusEl.style.display = allItems.length ? 'none' : 'block';
      adjustIframeHeight();
    }

    function renderPagination(totalPages) {
      if (totalPages <= 1) {
        paginationEl.innerHTML = '';
        return;
      }

      let buttons = '';
      for (let i = 1; i <= totalPages; i++) {
        buttons += `<button class="${i === currentPage ? 'is-active' : ''}" data-page="${i}" aria-label="Přejít na stránku ${i}">${i}</button>`;
      }

      paginationEl.innerHTML = `
        <div class="pagination__info">Stránka ${currentPage} z ${totalPages}</div>
        <button ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">Předchozí</button>
        ${buttons}
        <button ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">Další</button>
      `;

      paginationEl.querySelectorAll('button[data-page]').forEach(btn => {
        btn.addEventListener('click', () => {
          const page = Number(btn.getAttribute('data-page'));
          if (page && page !== currentPage) {
            renderPage(page);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        });
      });
    }

    let lastReportedHeight = 0;

    function getDocumentHeight() {
      return Math.max(
        document.body ? document.body.scrollHeight : 0,
        document.documentElement ? document.documentElement.scrollHeight : 0,
        document.body ? document.body.offsetHeight : 0,
        document.documentElement ? document.documentElement.offsetHeight : 0,
        document.body ? document.body.clientHeight : 0,
        document.documentElement ? document.documentElement.clientHeight : 0
      );
    }

    function adjustIframeHeight(force = false) {
      const height = getDocumentHeight();
      if (!force && Math.abs(height - lastReportedHeight) < 2) return;
      lastReportedHeight = height;

      if (window.parent !== window) {
        window.parent.postMessage({ type: 'tendersystems-widget-height', height }, '*');
      }
    }

    function setupIframeAutoHeight() {
      if (window.parent === window) return;

      const schedule = () => requestAnimationFrame(() => adjustIframeHeight());

      // Reacts to responsive reflow and viewport changes.
      window.addEventListener('resize', schedule);
      window.addEventListener('orientationchange', schedule);

      // Reacts to dynamic content changes (rendering, pagination, text clamp changes).
      if (typeof MutationObserver !== 'undefined') {
        const mo = new MutationObserver(schedule);
        mo.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });
      }

      // Reacts to pure layout reflow when the available width changes.
      if (typeof ResizeObserver !== 'undefined') {
        const ro = new ResizeObserver(schedule);
        ro.observe(document.documentElement);
        if (document.body) ro.observe(document.body);
      }

      // Initial sync and a few delayed syncs for browser/layout lag.
      adjustIframeHeight(true);
      setTimeout(() => adjustIframeHeight(true), 80);
      setTimeout(() => adjustIframeHeight(true), 250);
      setTimeout(() => adjustIframeHeight(true), 700);
    }

    async function loadFeed() {
      try {
        const results = await Promise.allSettled(
          RSS_SOURCE_URLS.map(url => fetchItemsFromSource(url))
        );
        const itemGroups = results
          .filter(result => result.status === 'fulfilled')
          .map(result => result.value);

        if (!itemGroups.length) {
          throw new Error('Nepodařilo se načíst RSS feed.');
        }

        allItems = mergeAndSortItems(itemGroups).map(normalizeItem);

        if (!allItems.length) {
          statusEl.textContent = 'Momentálně nejsou k dispozici žádné novinky.';
          return;
        }

        renderPage(1);
      } catch (error) {
        statusEl.innerHTML = 'Novinky se teď nepodařilo načíst. Otevřete prosím přímo <a href="https://www.tendersystems.cz/aktuality" target="_blank" rel="noopener noreferrer">stránku aktualit</a>.';
        newsListEl.innerHTML = '';
        paginationEl.innerHTML = '';
        adjustIframeHeight();
      }
    }

    window.addEventListener('load', () => {
      setupIframeAutoHeight();
      loadFeed();
    });
  </script>
</body>
</html>
