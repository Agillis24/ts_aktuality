<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tender systems – Novinky widget</title>
  <meta name="description" content="Widget novinek Tender systems z RSS feedu pro vložení do Weebly nebo jiného webu." />
  <style>
    :root {
      --ts-orange: #f58200;
      --ts-navy: #24324a;
      --ts-text: #24324a;
      --ts-muted: #6b7280;
      --ts-line: #e5e7eb;
      --ts-bg: #ffffff;
      --ts-soft: #f8fafc;
      --ts-radius: 18px;
      --ts-shadow: 0 8px 24px rgba(36, 50, 74, 0.08);
      --content-width: 1100px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #fff; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ts-text);
      line-height: 1.55;
      padding: 24px 18px 40px;
    }

    .widget {
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .widget__header {
      margin-bottom: 22px;
      text-align: center;
    }

    .widget__title {
      margin: 0;
      color: var(--ts-orange);
      font-size: clamp(28px, 4vw, 46px);
      font-weight: 700;
      line-height: 1.15;
    }

    .widget__subtitle {
      margin: 10px auto 0;
      max-width: 760px;
      color: var(--ts-muted);
      font-size: 15px;
    }

    .status {
      padding: 18px 20px;
      border: 1px solid var(--ts-line);
      border-radius: 14px;
      background: var(--ts-soft);
      color: var(--ts-muted);
      text-align: center;
      margin-bottom: 20px;
    }

    .news-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      align-items: stretch;
    }

    .card {
      display: flex;
      flex-direction: column;
      background: var(--ts-bg);
      border: 1px solid var(--ts-line);
      border-radius: var(--ts-radius);
      box-shadow: var(--ts-shadow);
      overflow: hidden;
      min-height: 100%;
    }

    .card__media {
      display: block;
      min-height: 0;
      background: #eef2f7;
      position: relative;
      width: 100%;
      height: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }

    .card__media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card__body {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    .card__date {
      display: inline-block;
      margin-bottom: 10px;
      color: var(--ts-orange);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .card__title {
      margin: 0 0 12px;
      font-size: clamp(19px, 1.15vw, 24px);
      line-height: 1.24;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: calc(1.24em * 2);
    }

    .card__title a {
      color: var(--ts-navy);
      text-decoration: none;
    }

    .card__title a:hover,
    .card__title a:focus {
      color: var(--ts-orange);
    }

    .card__excerpt {
      margin: 0 0 18px;
      color: var(--ts-text);
      font-size: 16px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: calc(1.5em * 4);
    }

    .card__actions {
      margin-top: auto;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      flex: 1 1 170px;
      white-space: nowrap;
    }

    .btn:hover,
    .btn:focus { transform: translateY(-1px); }

    .btn--primary {
      background: var(--ts-orange);
      color: #fff;
      box-shadow: 0 6px 18px rgba(245, 130, 0, 0.22);
    }

    .btn--secondary {
      color: var(--ts-navy);
      border: 1px solid var(--ts-line);
      background: #fff;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .pagination__info {
      color: var(--ts-muted);
      font-size: 14px;
      width: 100%;
      text-align: center;
      margin-bottom: 2px;
    }

    .pagination button {
      min-width: 44px;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--ts-line);
      border-radius: 999px;
      background: #fff;
      color: var(--ts-navy);
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    .pagination button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .pagination button.is-active {
      background: var(--ts-orange);
      border-color: var(--ts-orange);
      color: #fff;
    }

    @media (max-width: 1024px) {
      body { padding: 20px 14px 32px; }
      .news-list {
        gap: 18px;
      }
      .card__body {
        padding: 14px 14px 16px;
      }
      .card__title {
        font-size: clamp(18px, 1.8vw, 21px);
      }
      .card__excerpt {
        font-size: 15px;
        -webkit-line-clamp: 3;
        min-height: calc(1.5em * 3);
      }
      .btn {
        min-height: 40px;
      }
    }

    @media (max-width: 900px) {
      body { padding: 18px 12px 32px; }
      .news-list {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .card__media {
        aspect-ratio: 16 / 9;
      }
      .card__body {
        padding: 18px;
      }
      .card__title {
        font-size: 20px;
      }
      .card__excerpt {
        font-size: 16px;
        -webkit-line-clamp: 4;
        min-height: calc(1.5em * 4);
      }
      .btn {
        flex: 1 1 150px;
      }
    }

    @media (max-width: 460px) {
      .card__actions {
        gap: 10px;
      }
      .btn {
        flex: 1 1 100%;
      }
      .pagination {
        gap: 8px;
      }
      .pagination button {
        min-width: 40px;
        min-height: 40px;
        padding: 0 12px;
      }
    }
  </style>
</head>
<body>
  <div class="widget">
    <header class="widget__header">
      <h1 class="widget__title">Ze světa Tender systems</h1>
    </header>

    <div id="status" class="status">Načítám novinky…</div>
    <section id="newsList" class="news-list" aria-live="polite"></section>
    <nav id="pagination" class="pagination" aria-label="Stránkování novinek"></nav>
  </div>

  <script>
    const RSS_URL = 'https://www.tendersystems.cz/aktuality/feed';
    const PAGE_SIZE = 10;
    const FALLBACK_IMAGE = 'https://www.tendersystems.cz/uploads/6/4/0/7/64075341/ze-sv-ta-tender-systems-7_orig.png';
    // Optional manual overrides: use article URL as key and your image URL as value.
    const MANUAL_IMAGE_OVERRIDES = {
      'https://www.tendersystems.cz/aktuality/tender-expres-prehled-novych-funkcionalit-pro-elektronicke-katalogy': 'https://www.tendersystems.cz/uploads/6/4/0/7/64075341/6347109b-a751-47fa-acc7-30a0a7ca4360_orig.png',
      'https://www.tendersystems.cz/aktuality/on-line-workshop-zdarma-nakup-potravin-s-vyuzitim-elektronickych-katalogu': 'https://www.tendersystems.cz/uploads/6/4/0/7/64075341/3d14d431-2116-402d-8ea0-0c9526aeb856_orig.png',
      'https://www.tendersystems.cz/aktuality/tender-arena-nove-prijima-nabidky-i-z-portalu-zakazky-gov': 'https://www.tendersystems.cz/uploads/6/4/0/7/64075341/e4a09d91-a0d2-4801-9509-556fca5f7c3d_orig.png',
      'https://www.tendersystems.cz/aktuality/zakazky-gov-predstaveny-na-konferenci-isss-v-hradci-kralove': 'https://www.tendersystems.cz/uploads/6/4/0/7/64075341/cdb5897d-56ee-4910-b6bf-6078647a42a2_orig.png',
      'https://www.tendersystems.cz/aktuality/pripravili-jsme-novy-e-learningovy-kurz-pro-novacky-v-roli-zadavatele': 'https://www.tendersystems.cz/uploads/6/4/0/7/64075341/a715b4ad-7ca3-47f9-8992-910b653bffcc_orig.png',
      'https://www.tendersystems.cz/aktuality/objevte-kouzlo-nakupovani-s-e-katalogy': 'https://www.tendersystems.cz/uploads/6/4/0/7/64075341/4e54ab35-ab44-4c4e-8c95-cf2a00f127d2_orig.png',
      'https://www.tendersystems.cz/aktuality/dulezite-zmena-prihlasovani-dodavatelu-od-10-4-2026': 'https://www.tendersystems.cz/uploads/6/4/0/7/64075341/e21f0c1d-e1ee-4ec7-8614-9d7b25f896f0_orig.png'
    };
    const MANUAL_IMAGE_VERSION = '20260610';

    function normalizeUrlKey(rawUrl) {
      if (!rawUrl) return '';
      try {
        const url = new URL(rawUrl, 'https://www.tendersystems.cz');
        const host = url.hostname.toLowerCase().replace(/^www\./, '');
        const path = url.pathname.replace(/\/+$/, '');
        return `${host}${path}`;
      } catch (_) {
        return String(rawUrl)
          .trim()
          .toLowerCase()
          .replace(/^https?:\/\//, '')
          .replace(/^www\./, '')
          .split(/[?#]/)[0]
          .replace(/\/+$/, '');
      }
    }

    const MANUAL_IMAGE_OVERRIDES_BY_KEY = Object.fromEntries(
      Object.entries(MANUAL_IMAGE_OVERRIDES).map(([key, value]) => [normalizeUrlKey(key), value])
    );

    const statusEl = document.getElementById('status');
    const newsListEl = document.getElementById('newsList');
    const paginationEl = document.getElementById('pagination');

    let allItems = [];
    let currentPage = 1;

    function decodeHtmlEntities(str) {
      const txt = document.createElement('textarea');
      txt.innerHTML = str || '';
      return txt.value;
    }

    function stripHtml(html) {
      const temp = document.createElement('div');
      temp.innerHTML = html || '';
      return (temp.textContent || temp.innerText || '').replace(/\s+/g, ' ').trim();
    }

    function truncate(text, maxLength = 260) {
      if (!text) return '';
      if (text.length <= maxLength) return text;
      return text.slice(0, maxLength).replace(/\s+\S*$/, '') + '…';
    }

    function extractImage(item) {
      const encoded = item['content:encoded'] || item.content || '';
      const description = item.description || '';
      const html = encoded || description;
      const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
      return match ? match[1] : FALLBACK_IMAGE;
    }

    function getManualImageOverride(link) {
      if (!link) return '';
      const normalizedLink = normalizeUrlKey(link);
      const image = MANUAL_IMAGE_OVERRIDES_BY_KEY[normalizedLink] || '';
      if (!image) return '';
      const separator = image.includes('?') ? '&' : '?';
      return `${image}${separator}v=${MANUAL_IMAGE_VERSION}`;
    }

    function extractText(item) {
      const encoded = item['content:encoded'] || item.content || '';
      const description = item.description || '';
      const text = stripHtml(decodeHtmlEntities(encoded || description));
      return truncate(text, 260);
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      if (isNaN(date)) return '';
      return new Intl.DateTimeFormat('cs-CZ', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      }).format(date);
    }

    function normalizeItem(item) {
      const link = item.link || 'https://www.tendersystems.cz/aktuality';
      const rssImage = extractImage(item);
      const manualImage = getManualImageOverride(link);
      return {
        title: decodeHtmlEntities(item.title || 'Bez názvu'),
        link,
        date: formatDate(item.pubDate || item.published || item.isoDate),
        excerpt: extractText(item),
        image: manualImage || rssImage || FALLBACK_IMAGE
      };
    }

    function renderPage(page) {
      currentPage = page;
      const totalPages = Math.max(1, Math.ceil(allItems.length / PAGE_SIZE));
      const start = (page - 1) * PAGE_SIZE;
      const items = allItems.slice(start, start + PAGE_SIZE);

      newsListEl.innerHTML = items.map(item => `
        <article class="card">
          <a class="card__media" href="${item.link}" target="_blank" rel="noopener noreferrer" aria-label="Otevřít článek ${item.title}">
            <img src="${item.image}" alt="Náhled článku ${item.title}" loading="lazy" onerror="this.onerror=null;this.src='${FALLBACK_IMAGE}'">
          </a>
          <div class="card__body">
            <div class="card__date">${item.date}</div>
            <h2 class="card__title"><a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a></h2>
            <p class="card__excerpt">${item.excerpt}</p>
            <div class="card__actions">
              <a class="btn btn--primary" href="${item.link}" target="_blank" rel="noopener noreferrer">Číst novinku</a>
            </div>
          </div>
        </article>
      `).join('');

      renderPagination(totalPages);
      statusEl.style.display = allItems.length ? 'none' : 'block';
      adjustIframeHeight();
    }

    function renderPagination(totalPages) {
      if (totalPages <= 1) {
        paginationEl.innerHTML = '';
        return;
      }

      let buttons = '';
      for (let i = 1; i <= totalPages; i++) {
        buttons += `<button class="${i === currentPage ? 'is-active' : ''}" data-page="${i}" aria-label="Přejít na stránku ${i}">${i}</button>`;
      }

      paginationEl.innerHTML = `
        <div class="pagination__info">Stránka ${currentPage} z ${totalPages}</div>
        <button ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">Předchozí</button>
        ${buttons}
        <button ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">Další</button>
      `;

      paginationEl.querySelectorAll('button[data-page]').forEach(btn => {
        btn.addEventListener('click', () => {
          const page = Number(btn.getAttribute('data-page'));
          if (page && page !== currentPage) {
            renderPage(page);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        });
      });
    }

    let lastReportedHeight = 0;

    function getDocumentHeight() {
      return Math.max(
        document.body ? document.body.scrollHeight : 0,
        document.documentElement ? document.documentElement.scrollHeight : 0,
        document.body ? document.body.offsetHeight : 0,
        document.documentElement ? document.documentElement.offsetHeight : 0,
        document.body ? document.body.clientHeight : 0,
        document.documentElement ? document.documentElement.clientHeight : 0
      );
    }

    function adjustIframeHeight(force = false) {
      const height = getDocumentHeight();
      if (!force && Math.abs(height - lastReportedHeight) < 2) return;
      lastReportedHeight = height;

      if (window.parent !== window) {
        window.parent.postMessage({ type: 'tendersystems-widget-height', height }, '*');
      }
    }

    function setupIframeAutoHeight() {
      if (window.parent === window) return;

      const schedule = () => requestAnimationFrame(() => adjustIframeHeight());

      // Reacts to responsive reflow and viewport changes.
      window.addEventListener('resize', schedule);
      window.addEventListener('orientationchange', schedule);

      // Reacts to dynamic content changes (rendering, pagination, text clamp changes).
      if (typeof MutationObserver !== 'undefined') {
        const mo = new MutationObserver(schedule);
        mo.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });
      }

      // Reacts to late image loads that can change layout height.
      document.addEventListener('load', function(e) {
        if (e.target && e.target.tagName === 'IMG') schedule();
      }, true);

      // Initial sync and a few delayed syncs for browser/layout lag.
      adjustIframeHeight(true);
      setTimeout(() => adjustIframeHeight(true), 80);
      setTimeout(() => adjustIframeHeight(true), 250);
      setTimeout(() => adjustIframeHeight(true), 700);
    }

    async function loadFeed() {
      try {
        const separator = RSS_URL.includes('?') ? '&' : '?';
        const cacheBustedRssUrl = `${RSS_URL}${separator}cb=${Date.now()}`;
        const endpoint = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(cacheBustedRssUrl);
        const res = await fetch(endpoint);
        const data = await res.json();

        if (!data || data.status !== 'ok' || !Array.isArray(data.items)) {
          throw new Error('Nepodařilo se načíst RSS feed.');
        }

        allItems = data.items.map(normalizeItem);

        if (!allItems.length) {
          statusEl.textContent = 'Momentálně nejsou k dispozici žádné novinky.';
          return;
        }

        renderPage(1);
      } catch (error) {
        statusEl.innerHTML = 'Novinky se teď nepodařilo načíst. Otevřete prosím přímo <a href="https://www.tendersystems.cz/aktuality" target="_blank" rel="noopener noreferrer">stránku aktualit</a>.';
        newsListEl.innerHTML = '';
        paginationEl.innerHTML = '';
        adjustIframeHeight();
      }
    }

    window.addEventListener('load', () => {
      setupIframeAutoHeight();
      loadFeed();
    });
  </script>
</body>
</html>
